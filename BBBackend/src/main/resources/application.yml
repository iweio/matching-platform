server:
  port: 8080

spring:
  application:
    name: matching-platform
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/matching_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.matching.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

matching:
  agent-chat-round-delay-ms: 80
  simulation-rounds: 10
  internal-token: ""
  agent-service-url: ${AGENT_SERVICE_URL:http://127.0.0.1:8001}
